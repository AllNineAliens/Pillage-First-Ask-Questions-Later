name: ci

permissions:
  contents: read
  pull-requests: read

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - master
      - develop
  push:
    branches:
      - master
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  TURBO_CACHE_DIR: .turbo

jobs:
  type-check:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup environment (node + install)
        uses: ./.github/actions/node-setup

      - name: Run type check
        run: npx turbo run type-check

  lint:
    name: Lint check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup environment (node + install)
        uses: ./.github/actions/node-setup

      - name: Run lint check
        run: npx turbo run lint:check

  format:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup environment (node + install)
        uses: ./.github/actions/node-setup

      - name: Run format check
        run: npx turbo run format:check

  zizmor:
    name: Zizmor GitHub Actions check
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6

  localize:
    name: Localization check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup environment (node + install)
        uses: ./.github/actions/node-setup

      - name: Run @pillage-first/web localization check
        run: npx --workspace="@pillage-first/web" i18next-cli extract --ci --dry-run

  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup environment (node + install)
        uses: ./.github/actions/node-setup

      - name: Run tests
        id: run-tests
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"

            # Check if package.json or schemas changed
            CHANGED_FILES=$(git diff --name-only $BASE_SHA HEAD)
            FORCE_ALL=false
            if echo "$CHANGED_FILES" | grep -q "package.json" || echo "$CHANGED_FILES" | grep -q "^packages/db/src/schemas/"; then
              FORCE_ALL=true
            fi

            if [ "$FORCE_ALL" = true ]; then
              echo "Important files changed, running all tests..."
              npx turbo run test
            else
              npx turbo run test --filter="[$BASE_SHA...HEAD]" -- --changed="$BASE_SHA"
            fi
          else
            npx turbo run test
          fi
